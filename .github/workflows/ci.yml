name: CI

# Runs on every push to any branch and on every pull request.
# To enforce this as a merge gate, go to:
#   GitHub → Settings → Branches → Branch protection rules → main
#   → "Require status checks to pass before merging" → select "Lint & Test"
#     and "E2E Smoke"

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/setup-node with cache: 'npm' automatically caches ~/.npm
      # using a key derived from package-lock.json.  On cache hit, npm ci
      # resolves in seconds instead of downloading from the registry.
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # npm run test:run = "vitest run" (single-pass, non-interactive).
      # This is the correct CI invocation — "npm test" starts watch mode.
      - name: Run tests
        run: npm run test:run

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: test  # non partiamo se lint+test falliscono
    timeout-minutes: 8  # DoD locked: suite sotto i 4 min

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache dei binari Chromium: chromium-headless-shell ~93 MB, evitiamo
      # il download a ogni run. La chiave include la versione Playwright.
      - name: Get installed Playwright version
        id: playwright-version
        run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium

      # test:e2e = build:e2e (mode e2e → .env.e2e) && playwright test
      # Il playwright.config.ts avvia npm run preview come webServer.
      - name: Run E2E smoke tests
        run: npm run test:e2e

      # Se il test fallisce, i trace/screenshot sono utili per capire.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
