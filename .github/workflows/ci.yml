name: CI

# Runs on every push to any branch and on every pull request.
# To enforce this as a merge gate, go to:
#   GitHub → Settings → Branches → Branch protection rules → main
#   → "Require status checks to pass before merging" → select "test"
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # actions/setup-node with cache: 'npm' automatically caches ~/.npm
      # using a key derived from package-lock.json.  On cache hit, npm ci
      # resolves in seconds instead of downloading from the registry.
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # npm run test:run = "vitest run" (single-pass, non-interactive).
      # This is the correct CI invocation — "npm test" starts watch mode.
      - name: Run tests
        run: npm run test:run
